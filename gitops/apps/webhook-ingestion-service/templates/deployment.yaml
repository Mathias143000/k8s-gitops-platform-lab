apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webhook-ingestion-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "webhook-ingestion-service.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "webhook-ingestion-service.fullname" . }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              value: "sqlite+aiosqlite:///./data/webhooks.db"
            - name: TASK_QUEUE_BACKEND
              value: "inline"
            - name: AUTO_CREATE_TABLES
              value: "true"
            - name: JSON_LOGS
              value: "true"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "webhook-ingestion-service.fullname" . }}
                  key: API_KEY
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "webhook-ingestion-service.fullname" . }}
                  key: WEBHOOK_SECRET
            - name: TRACING_ENABLED
              value: "false"
          volumeMounts:
            - name: webhook-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: webhook-data
          emptyDir: {}

