nameOverride: service-desk-api

image:
  repository: k8s-lab/service-desk-api
  tag: "2.0.0"
  pullPolicy: IfNotPresent

appVersion: "2.0.0"
djangoSecretKey: "change-me-service-desk"
replicaCount: 1
readinessPath: /api/health/
ingress:
  enabled: true
  className: nginx
  host: service-desk.127.0.0.1.sslip.io
  tlsSecretName: service-desk-demo-tls
  clusterIssuer: selfsigned-cluster-issuer
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

