name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  charts-and-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint service-desk
        run: helm lint gitops/apps/service-desk-api

      - name: Helm lint webhook
        run: helm lint gitops/apps/webhook-ingestion-service

      - name: GitOps policy check
        run: python scripts/policy_check.py

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
